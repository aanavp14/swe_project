<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — RoadMapper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-100 font-sans text-gray-900 antialiased min-h-screen">
  <div class="flex h-1.5 w-full">
    <div class="flex-1 bg-[#007FAF]"></div>
    <div class="flex-1 bg-[#426F42]"></div>
    <div class="flex-1 bg-[#F48F00]"></div>
  </div>
  <header class="py-6 text-center">
    <h1 class="text-4xl font-bold tracking-tight text-gray-900 m-0">
      <a href="/" class="roadmapper-gradient no-underline hover:opacity-80">RoadMapper</a>
    </h1>
  </header>
  <main class="max-w-md mx-auto mb-10 bg-white p-8 rounded-md shadow-md border-t-4 border-[#007FAF]">
    <h2 class="text-2xl font-bold text-gray-900 mb-4">Log in</h2>
    {% if error %}
    <p class="text-red-600 text-sm mb-4">{{ error }}</p>
    {% endif %}
    <form method="post" class="space-y-4">
      {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}" />{% endif %}
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#007FAF]" placeholder="you@example.com" />
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#007FAF]" />
      </div>
      <button type="submit" class="w-full bg-[#007FAF] hover:bg-[#006A93] text-white font-semibold py-3 rounded-sm transition-colors">Log in</button>
    </form>
    <p class="mt-4 text-gray-600 text-sm">
      Don't have an account? <a href="{{ url_for('auth.signup') }}" class="text-[#007FAF] hover:underline font-medium">Sign up</a>
    </p>
  </main>
</body>
</html>
