<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — RoadMapper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            roadmapper: {
              blue: '#007FAF',
              green: '#426F42',
              orange: '#F48F00',
              bg: '#F9FAFB'
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-roadmapper-bg font-sans text-gray-900 antialiased min-h-screen flex flex-col">
  <header class="py-8 text-center shrink-0">
    <h1 class="text-4xl font-extrabold tracking-tight text-gray-900 m-0">
      <a href="/" class="text-roadmapper-blue no-underline hover:opacity-80 transition-opacity">RoadMapper</a>
    </h1>
  </header>
  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-gray-200 relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-1.5 bg-roadmapper-blue"></div>
      <h2 class="text-2xl font-extrabold text-gray-900 mb-6 text-center tracking-tight">Log in</h2>

      {% if error %}
      <div class="bg-red-50 text-red-700 p-3 rounded-xl border border-red-200 mb-6 text-sm font-medium text-center">{{ error }}</div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}" />{% endif %}
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-roadmapper-blue transition-all" placeholder="you@example.com" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-roadmapper-blue transition-all" />
        </div>
        <button type="submit" class="w-full bg-roadmapper-blue hover:bg-[#006A93] text-white font-bold py-3 px-6 rounded-xl transition-all mt-2 shadow-md">Log in</button>
      </form>
      <p class="text-center text-gray-600 mt-8 text-sm">
        Don't have an account? <a href="{{ url_for('auth.signup') }}" class="text-roadmapper-blue font-bold hover:underline">Sign up</a>
      </p>
    </div>
  </main>
</body>
</html>
