<!DOCTYPE html>
<!-- Create trip page: form to create a new trip -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create a trip — RoadMapper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-100 font-sans text-gray-900 antialiased min-h-screen">
  <div class="flex h-1.5 w-full">
    <div class="flex-1 bg-[#007FAF]"></div>
    <div class="flex-1 bg-[#426F42]"></div>
    <div class="flex-1 bg-[#F48F00]"></div>
  </div>
  <header class="py-6 text-center">
    <h1 class="text-4xl font-bold tracking-tight text-gray-900 m-0">
      <a href="/" class="roadmapper-gradient no-underline hover:opacity-80">RoadMapper</a>
    </h1>
  </header>
  <main class="max-w-3xl mx-auto mb-10 bg-white p-8 rounded-md shadow-md sm:p-10 border-t-4 border-[#007FAF]">
    <section id="create-trip">
      <h2 class="text-2xl font-bold text-gray-900 mb-2 mt-0">Create a trip</h2>
      <p id="ai-status-msg" class="text-gray-500 text-sm italic mb-4">Checking AI connection…</p>
      <p class="text-gray-600 mb-8 leading-relaxed">Enter your trip details. AI will generate flight, hotel, and activity suggestions based on your preferences and budget.</p>
      
      <form id="create-trip-form" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="origin" class="block text-sm font-medium text-gray-700 mb-2">Starting location</label>
            <input type="text" id="origin" name="origin" required placeholder="e.g. Los Angeles, CA" class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#007FAF] bg-gray-50" />
          </div>
          <div>
            <label for="destination" class="block text-sm font-medium text-gray-700 mb-2">Destination</label>
            <input type="text" id="destination" name="destination" required placeholder="e.g. Miami, FL" class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#007FAF] bg-gray-50" />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="per_person_budget" class="block text-sm font-medium text-gray-700 mb-2">Budget per person ($)</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="text-gray-500 sm:text-sm">$</span>
              </div>
              <input type="number" id="per_person_budget" name="per_person_budget" min="0" step="0.01" required placeholder="e.g. 500" class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#007FAF] bg-gray-50" />
            </div>
          </div>
          <div>
            <label for="num_people" class="block text-sm font-medium text-gray-700 mb-2">Number of people</label>
            <input type="number" id="num_people" name="num_people" min="1" required placeholder="e.g. 2" class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#007FAF] bg-gray-50" />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="start_date" class="block text-sm font-medium text-gray-700 mb-2">Start date</label>
            <input type="date" id="start_date" name="start_date" required class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#007FAF] bg-gray-50 text-gray-700" />
          </div>
          <div>
            <label for="end_date" class="block text-sm font-medium text-gray-700 mb-2">Return date</label>
            <input type="date" id="end_date" name="end_date" required class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#007FAF] bg-gray-50 text-gray-700" />
          </div>
        </div>

        <div>
          <label for="activity_preferences" class="block text-sm font-medium text-gray-700 mb-2">Activity preferences</label>
          <textarea id="activity_preferences" name="activity_preferences" rows="3" placeholder="e.g. beach, food tours, museums, nightlife" class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#007FAF] bg-gray-50"></textarea>
        </div>

        <button type="submit" class="w-full sm:w-auto bg-[#007FAF] hover:bg-[#006A93] text-white font-semibold py-3 px-8 rounded-sm transition-colors text-lg mt-4 shadow-sm">Create trip</button>
      </form>
      <p id="create-error" class="text-[#F48F00] text-sm mt-4 font-medium" hidden></p>
    </section>
    
    <section id="invite-section" class="text-center py-8" hidden>
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 text-green-500 mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Trip created!</h2>
      <p class="text-gray-600 mb-6">Share this link so others can join and add their budget:</p>
      <div class="bg-gray-50 p-4 rounded-sm border border-gray-200 break-all max-w-xl mx-auto">
        <a id="invite-link" href="#" class="text-[#007FAF] font-medium hover:underline text-lg"></a>
      </div>
    </section>
  </main>
  <script src="/static/js/app.js"></script>
</body>
</html>
